<!DOCTYPE html>
<html>
<head>
  <title>GM Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<h1>GM Dashboard</h1>

<h2>KPI</h2>
<div id="kpi"></div>

<h2>GM Comparison</h2>
<canvas id="gmChart"></canvas>

<h2>Project Drill</h2>
<select id="projectSelect"></select>
<div id="details"></div>

<script>

const SHEET_ID = "1Y6iwc9uI52vs5aTZa4c1c55b93J-h3qh5oQIKPJMkF0";

// ==========================
// FETCH DATA (FIXED NAMES)
// ==========================
Promise.all([
  fetch(`https://opensheet.elk.sh/${SHEET_ID}/BOM`).then(r => r.json()),
  fetch(`https://opensheet.elk.sh/${SHEET_ID}/Master%20Summary1`).then(r => r.json()),
  fetch(`https://opensheet.elk.sh/${SHEET_ID}/GRN`).then(r => r.json()),
  fetch(`https://opensheet.elk.sh/${SHEET_ID}/Booking%20Data`).then(r => r.json())
])
.then(([bom, master, grn, booking]) => {

  console.log("BOM:", bom);
  console.log("MASTER:", master);
  console.log("GRN:", grn);
  console.log("BOOKING:", booking);

  let projects = {};

  // ==========================
  // MASTER → Revenue
  // ==========================
  master.forEach(r => {
    let id = r["Project ID"];
    if (!id) return;

    projects[id] = {
      revenue: parseFloat(r["Booking Value"]) || 0,
      designCost: 0,
      installCost: 0,
      region: "",
      sales: "",
      status: ""
    };
  });

  // ==========================
  // BOM → Design Cost
  // ==========================
  bom.forEach(r => {
    let id = r["Project ID"];
    let amt = parseFloat(r["Amount"]) || 0;
    if (!id) return;

    if (!projects[id]) {
      projects[id] = { revenue: 0, designCost: 0, installCost: 0 };
    }

    projects[id].designCost += amt;
  });

  // ==========================
  // GRN → Install Cost
  // ==========================
  grn.forEach(r => {
    let id = r["Project ID"];
    let amt = parseFloat(r["Actual Cost"]) || 0;
    if (!id) return;

    if (!projects[id]) {
      projects[id] = { revenue: 0, designCost: 0, installCost: 0 };
    }

    projects[id].installCost += amt;
  });

  // ==========================
  // BOOKING → Extra Info
  // ==========================
  booking.forEach(r => {
    let id = r["Project ID"];
    if (!id) return;

    if (!projects[id]) {
      projects[id] = { revenue: 0, designCost: 0, installCost: 0 };
    }

    projects[id].region = r["Region"] || "";
    projects[id].sales = r["Sales Person"] || "";
    projects[id].status = r["Status"] || "";
  });

  // ==========================
  // CALCULATE GM
  // ==========================
  let labels = [];
  let designGM = [];
  let installGM = [];

  let totalRevenue = 0;
  let totalCost = 0;

  Object.keys(projects).forEach(id => {
    let p = projects[id];

    let dgm = p.revenue ? ((p.revenue - p.designCost)/p.revenue)*100 : 0;
    let igm = p.revenue ? ((p.revenue - p.installCost)/p.revenue)*100 : 0;

    labels.push(id);
    designGM.push(dgm.toFixed(2));
    installGM.push(igm.toFixed(2));

    totalRevenue += p.revenue;
    totalCost += p.installCost;
  });

  // ==========================
  // KPI DISPLAY
  // ==========================
  let gm = totalRevenue ? ((totalRevenue - totalCost)/totalRevenue)*100 : 0;

  document.getElementById("kpi").innerHTML = `
    <b>Total Revenue:</b> ${totalRevenue}<br>
    <b>Total Cost:</b> ${totalCost}<br>
    <b>Blended GM%:</b> ${gm.toFixed(2)}
  `;

  // ==========================
  // CHART
  // ==========================
  new Chart(document.getElementById("gmChart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [
        { label: "Design GM %", data: designGM },
        { label: "Install GM %", data: installGM }
      ]
    }
  });

  // ==========================
  // DROPDOWN
  // ==========================
  let select = document.getElementById("projectSelect");

  labels.forEach(id => {
    let opt = document.createElement("option");
    opt.value = id;
    opt.text = id;
    select.appendChild(opt);
  });

  // ==========================
  // DRILL DOWN
  // ==========================
  select.addEventListener("change", () => {
    let p = projects[select.value];

    document.getElementById("details").innerHTML = `
      <b>Revenue:</b> ${p.revenue}<br>
      <b>Design Cost:</b> ${p.designCost}<br>
      <b>Install Cost:</b> ${p.installCost}<br>
      <b>Design GM:</b> ${((p.revenue - p.designCost)/p.revenue*100).toFixed(2)}%<br>
      <b>Install GM:</b> ${((p.revenue - p.installCost)/p.revenue*100).toFixed(2)}%
    `;
  });

})
.catch(err => {
  console.error("ERROR:", err);
  alert("Data not loading. Check sheet access or names.");
});

</script>

</body>
</html>
